---
# Codacy configuration file for grader_tool Flutter project

# Exclude generated and third-party code from analysis
exclude_paths:
  - 'build/**'
  - '.dart_tool/**'
  - 'windows/**'
  - 'macos/**'
  - 'linux/**'
  - 'ios/**'
  - 'android/**'
  - '**.g.dart'
  - '**.freezed.dart'
  - '**.mocks.dart'
  - 'test/.test_coverage.dart'

# Configure engines
engines:
  # Dart/Flutter analysis
  dartanalyzer:
    enabled: true
    
  # Completely disable C++ analysis (Flutter runner code is auto-generated)
  cppcheck:
    enabled: false
    exclude_paths:
      - 'windows/**'
      - 'macos/**'
      - 'linux/**'
      - 'ios/**'
      - 'android/**'
    
  # Code duplication detection
  duplication:
    enabled: true
    exclude_paths:
      - 'test/**'
      - '**.g.dart'
      - 'windows/**'
      - 'macos/**'
      - 'linux/**'
      - 'ios/**'
      - 'android/**'
    config:
      languages:
        - dart
        
  # Code coverage
  coverage:
    enabled: false

# File extensions to analyze
file_extensions:
  - .dart
  - .yaml
  - .yml

# Ignore patterns
ignore:
  - '*.g.dart'
  - '*.freezed.dart'
  - '*.mocks.dart'
  - 'pubspec.lock'
  - 'windows/**'
  - 'macos/**'
  - 'linux/**'
  - 'ios/**'
  - 'android/**'
